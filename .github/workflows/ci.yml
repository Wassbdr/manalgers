name: backend-ci

on:
  push:
    paths:
      - "aether/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "aether/**"
      - ".github/workflows/ci.yml"

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/aether
    defaults:
      run:
        working-directory: aether

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest -q
